apiVersion: v1
kind: Service
metadata:
  name: recsys-api
  namespace: cinewave
  labels:
    app: recsys-api
spec:
  type: ClusterIP
  selector:
    app: recsys-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: recsys-api-lb
  namespace: cinewave
spec:
  type: LoadBalancer
  selector:
    app: recsys-api
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cinewave-ingress
  namespace: cinewave
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.cinewave.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: recsys-api
                port:
                  number: 80
