apiVersion: apps/v1
kind: Deployment
metadata:
  name: recsys-api
  namespace: cinewave
  labels:
    app: recsys-api
    version: v6.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: recsys-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: recsys-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: recsys-api
          image: cinewave/recsys-api:v6.0.0
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cinewave-secrets
                  key: openai-api-key
            - name: PYTHONPATH
              value: "/app/src"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Namespace
metadata:
  name: cinewave
