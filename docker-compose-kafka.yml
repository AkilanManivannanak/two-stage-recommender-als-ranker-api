# docker-compose-kafka.yml
# =====================================================================
# Kafka + Flink streaming overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose-kafka.yml up -d
#
# ARM64 (Apple M1/M2/M3): uses confluentinc images (ARM-compatible)
# x86_64: same images work fine
#
# Topics created automatically by kafka_init service:
#   recsys.events          — all user interaction events
#   recsys.impressions     — page impression batches
#   recsys.feature_updates — real-time feature updates to Redis
#
# Flink job: processes events → writes hot features to Redis
# =====================================================================

networks:
  recsys_net:
    external: true

volumes:
  kafka_data:
  flink_data:

services:

  # ── Zookeeper (required by Kafka) ─────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: recsys_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - kafka_data:/var/lib/zookeeper/data
    networks:
      - recsys_net
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka broker ──────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: recsys_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    networks:
      - recsys_net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka topic initialiser ───────────────────────────────────────
  kafka_init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: recsys_kafka_init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - recsys_net
    entrypoint: >
      /bin/bash -c "
      echo 'Creating Kafka topics...' &&
      kafka-topics --create --if-not-exists
        --bootstrap-server kafka:29092
        --replication-factor 1 --partitions 3
        --topic recsys.events &&
      kafka-topics --create --if-not-exists
        --bootstrap-server kafka:29092
        --replication-factor 1 --partitions 3
        --topic recsys.impressions &&
      kafka-topics --create --if-not-exists
        --bootstrap-server kafka:29092
        --replication-factor 1 --partitions 3
        --topic recsys.feature_updates &&
      echo 'Topics ready.' &&
      kafka-topics --list --bootstrap-server kafka:29092
      "

  # ── Kafka UI (optional, for debugging) ───────────────────────────
  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: recsys_kafka_ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: recsys
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - recsys_net
    profiles:
      - kafka_ui

  # ── Apache Flink JobManager ───────────────────────────────────────
  flink_jobmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: recsys_flink_jobmanager
    restart: unless-stopped
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink_jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
    volumes:
      - flink_data:/tmp/flink
      - ./backend/infra/flink:/opt/flink/jobs
    networks:
      - recsys_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Apache Flink TaskManager ──────────────────────────────────────
  flink_taskmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: recsys_flink_taskmanager
    restart: unless-stopped
    depends_on:
      flink_jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink_jobmanager
        taskmanager.numberOfTaskSlots: 2
    volumes:
      - flink_data:/tmp/flink
    networks:
      - recsys_net

  # ── Flink Python job (feature pipeline) ──────────────────────────
  flink_feature_job:
    image: python:3.11-slim
    container_name: recsys_flink_feature_job
    restart: "no"
    depends_on:
      - kafka
    networks:
      - recsys_net
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    command: >
      /bin/bash -c "
      pip install kafka-python redis --quiet &&
      python /app/infra/flink/feature_pipeline.py
      "
    profiles:
      - streaming
