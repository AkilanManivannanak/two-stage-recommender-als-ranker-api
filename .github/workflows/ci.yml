name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend smoke ─────────────────────────────────────────────────────────────
  backend:
    name: Backend — Import smoke & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check (syntax errors)
        run: python -m compileall src -q

      - name: Import smoke — serving app
        env:
          OPENAI_API_KEY: ''
          TMDB_API_KEY: ''
          PYTHONPATH: src
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, 'src')
          from recsys.serving.rag_engine     import build_index
          from recsys.serving.session_intent import _SESSION_MODEL
          from recsys.serving.two_tower      import TWO_TOWER
          from recsys.serving.reward_model   import score as reward_score
          from recsys.serving.freshness_engine import FRESH_STORE, LAUNCH_DETECTOR, DRIFT_DETECTOR
          from recsys.serving.page_optimizer  import PageOptimizer
          from recsys.serving.realtime_engine import TRENDING, SESSION
          from recsys.serving import app as _app
          print('All imports OK')
          assert _SESSION_MODEL is not None, 'Session model not initialised'
          assert TWO_TOWER is not None, 'Two-tower model not initialised'
          print('Assertions passed')
          "

  # ── Frontend type-check ───────────────────────────────────────────────────────
  frontend:
    name: Frontend — TypeScript & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
        run: npm run build
